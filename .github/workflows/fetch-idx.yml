name: Fetch IDX Data

on:
  schedule:
    # Tiap 5 menit, Senin-Jumat, jam 09:00-16:00 WIB (02:00-09:00 UTC)
    - cron: '*/5 2-9 * * 1-5'
  workflow_dispatch:  # bisa trigger manual

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Fetch IDX data
        run: python scraper_static.py

      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          WIB_TIME=$(TZ='Asia/Jakarta' date '+%Y-%m-%d %H:%M WIB')
          git diff --staged --quiet || git commit -m "data: update IDX ${WIB_TIME}"
          git pull --rebase origin main
          git push
